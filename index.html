<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于我</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.8;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background: #fafafa;
        }

        .about-container {
            background: white;
            padding: 60px;
            border-radius: 12px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 0.5em;
            color: #222;
            border-bottom: 3px solid #ff6b6b;
            padding-bottom: 0.3em;
            display: inline-block;
        }

        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 2em;
        }

        .section {
            margin: 2em 0;
        }

        .section h2 {
            color: #444;
            margin-bottom: 0.8em;
            font-size: 1.5em;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 1em;
        }

        .skill-tag {
            background: #f0f0f0;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            color: #555;
        }

        .contact {
            margin-top: 3em;
            padding-top: 2em;
            border-top: 1px solid #eee;
        }

        .contact a {
            color: #ff6b6b;
            text-decoration: none;
            margin-right: 20px;
        }

        .contact a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .about-container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="about-container">
        <h1>你好，我是 XXX</h1>
        <p class="subtitle">全栈开发者 / 开源爱好者 / 技术写作者</p>

        <div class="section">
            <h2>👋 关于我</h2>
            <p>热爱技术的开发者，专注于 Web 开发和开源项目。喜欢探索新技术，分享学习心得。</p>
        </div>

        <div class="section">
            <h2>🛠️ 技术栈</h2>
            <div class="skills">
                <span class="skill-tag">JavaScript</span>
                <span class="skill-tag">Python</span>
                <span class="skill-tag">Go</span>
                <span class="skill-tag">React</span>
                <span class="skill-tag">Vue</span>
                <span class="skill-tag">Node.js</span>
            </div>
        </div>

        <div class="section">
            <h2>📝 最新动态</h2>
            <p>目前正在深入研究 AI 应用开发和云原生技术。</p>
        </div>

        <div class="contact">
            <h2>📮 联系我</h2>
            <a href="mailto:your@email.com">Email</a>
            <a href="https://github.com/yourusername" target="_blank">GitHub</a>
            <a href="https://twitter.com/yourusername" target="_blank">Twitter</a>
        </div>
    </div>
</body>
</html>
