<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <div class="profile-header">
            <img id="avatar" src="static/avatar.png" alt="Profile Picture">
        </div>

        <main class="content">
            <h1 id="intro-greeting">Hi, 你好！</h1>
            <p>多想、多做</p>
            <p>找自己</p>
            <p>做自己</p>
            <p>爱自己</p>
        </main>

        <footer class="social-links" id="social-container">
            <a href="mailto:your-email@example.com" class="email-link" title="联系我"><i class="fas fa-envelope"></i></a>
            <a href="https://github.com/Ydefrr" target="_blank"><i class="fa-brands fa-github"></i></a>
        </footer>
    </div>

</body>
</html>
